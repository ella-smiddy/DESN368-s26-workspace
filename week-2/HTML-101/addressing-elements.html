<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addressing Elements</title>
</head>
<body>
    <title>Simple Schedule</title>
</head>
<body>
    <nav>
        <a href="#section1">Section 1</a> |
        <a href="#section2">Section 2</a> |
        <a href="#section3">Section 3</a>
    </nav>
    <div id="section1" class="page-section">
        <h2>Section 1 - Monday To-Do's</h2>
        <p>
      <ul>
        <li>Car Wash</li>
        <li>Walk Dog</li>
        <li>Take Garbage Out</li>
      </ul>
      </p>
    </div>
    <div id="section2" class="page-section">
        <h2>Section 2 - Tuesday To-Do's</h2>
        <p>
          <ul>
            <li>Hair Cut</li>
            <li>Dentist</li>
            <li>Study For Exam</li>
        </p>
    </div>
    <div id="section3" class="page-section">
        <h2>Section 3 - Wednesday To-Do's</h2>
        <p>
          <ul>
            <li>Meet With CFO</li>
            <li>Go Over Design Plans</li>
            <li>Team Ice Breaker</li>
        </p>
    </div>
</body>
</html>
    
</body>
</html>
