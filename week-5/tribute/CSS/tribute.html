<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribute Page</title>
    <link rel="stylesheet" href="tribute.css">
</head>
<body>
    <main id="main">
        <header>
            <h1 id="title">Tribute Page</h1>
            <p id="subtitle">A tribute to someone inspiring</p>
        </header>

        <div id="img-div">
            <img id="image" src="image.jpg" alt="Tribute subject">
            <figcaption id="img-caption">Caption for the image</figcaption>
        </div>

        <section id="tribute-info">
            <h2>About</h2>
            <p>Add biographical information here.</p>
        </section>

        <section id="quote">
            <blockquote>
                <p>"Add an inspiring quote here."</p>
                <cite>— Subject Name</cite>
            </blockquote>
        </section>
    </main>
</body>
</html>
